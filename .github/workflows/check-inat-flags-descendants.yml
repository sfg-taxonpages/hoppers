name: Check iNaturalist Flags (index)

permissions:
  contents: write
  issues: write

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:

jobs:
  check-flags:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      # ---- HARD SAFETY CHECK ----
      # Ensures no old descendants code is still present
      - name: Verify no /children endpoint is used anywhere
        run: |
          echo "Checking for forbidden /children usage…"
          if grep -RIn "/children|taxa/.*children" scripts .github/workflows; then
            echo "ERROR: Found deprecated /children usage above."
            exit 1
          else
            echo "OK: No /children usage found."
          fi

      - name: Run iNaturalist flag checker (flags index)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

          # ---- iNaturalist settings ----
          INAT_ROOT_TAXON_IDS: "125816"
          USER_AGENT: "inat-flag-watcher/1.0 (contact: arboridia@gmail.com)"
          INAT_RESOLVED: "no"
          INAT_DELETED: "any"
          INAT_FLAG_TYPES: "inappropriate,other"

          # ---- tuning ----
          INAT_MAX_PAGES: "50"
          SLEEP_PAGES: "0.8"

        run: |
          python scripts/check_inat_flags_index.py

      - name: Upload debug HTML (page 1)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-html
          path: debug_flags_page1.html

      - name: Commit seen_flags.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add seen_flags.json || true
          if ! git diff --staged --quiet; then
            git commit -m "Update seen flags (automated)"
            git push
          else
            echo "No changes to commit"
          fi
